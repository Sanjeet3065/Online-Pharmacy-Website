<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCare - Online Pharmacy</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ===== HEADER / NAVBAR ===== -->
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo">
                    <h2>💊 MediCare</h2>
                </div>

                <div class="nav-links">
                    <a href="index.html" class="active">Home</a>
                    <a href="all-medicines.html">All Medicines</a>
                    <a href="cart.html" class="cart-link">
                         Cart <span id="cartCount">0</span>
                    </a>
                    <button id="themeToggle" class="theme-btn">🌙</button>
                </div>
            </div>
        </nav>
    </header>

    <!-- ===== SEARCH SECTION ===== -->
    <section class="search-section">
        <div class="container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search medicines by name or category..." onkeyup="searchMedicines()">
                <button onclick="searchMedicines()"> Search</button>
            </div>
        </div>
    </section>

    <!-- ===== MEDICINE CARDS ===== -->
    <section class="products-section">
        <div class="container">
            <h2>Our Medicines</h2>
            <div class="product-grid" id="productGrid">
                <!-- Medicines will load here from JavaScript -->
            </div>
        </div>
    </section>

    <!-- ===== FOOTER ===== -->
    <footer>
        <div class="container">
            <p>© 2026 MediCare. Made with ❤️ for  Coding Block internship project</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
