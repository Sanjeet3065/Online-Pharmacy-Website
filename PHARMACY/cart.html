<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - MediCare</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo">
                    <h2>💊 MediCare</h2>
                </div>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="all-medicines.html">All Medicines</a>
                    <a href="cart.html" class="active">🛒 Cart</a>
                    <button id="themeToggle" class="theme-btn">🌙</button>
                </div>
            </div>
        </nav>
    </header>

    <!-- ===== CART SECTION ===== -->
    <section class="cart-section">
        <div class="container">
            <h2>Shopping Cart</h2>
            
            <div id="cartContainer">
                <!-- Cart items will load here -->
            </div>

            <div class="cart-summary" id="cartSummary">
                <div class="total-box">
                    <h3>Total: ₹<span id="totalPrice">0</span></h3>
                    <div class="cart-buttons">
                        <button onclick="clearCart()" class="btn-danger">🗑️ Clear Cart</button>
                        <button onclick="confirmOrder()" class="btn-success">✅ Confirm Order</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>© 2026 MediCare. Made with ❤️ for Coding Block internship project</p>
        </div>
    </footer>

    <!-- ✅ SCRIPT ORDER SAHI KARO -->
    <script src="js/app.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
