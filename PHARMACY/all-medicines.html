<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Medicines - MediCare</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header>
        <nav class="navbar">
            <div class="container">
                <div class="logo">
                    <h2>💊 MediCare</h2>
                </div>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="all-medicines.html" class="active">All Medicines</a>
                    <a href="cart.html">🛒 Cart <span id="cartCount">0</span></a>
                    <button id="themeToggle" class="theme-btn">🌙</button>
                </div>
            </div>
        </nav>
    </header>

    <!-- ===== ALL MEDICINES TABLE ===== -->
    <section class="table-section">
        <div class="container">
            <h2>Complete Medicine List</h2>
            
            <div class="table-responsive">
                <table id="medicineTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Medicine Name</th>
                            <th>Category</th>
                            <th>Price (₹)</th>
                            <th>Stock</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="medicineTableBody">
                        <!-- Data will load from JavaScript -->
                    </tbody>
                </table>
            </div>

            <div class="table-total">
                <p>Total Medicines: <span id="totalMedicines">0</span></p>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>© 2026 MediCare. Made with ❤️ for internship project</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
